# Minimal local Airflow setup: Postgres metadata DB + scheduler + webserver,
# using LocalExecutor. Deliberately skips Celery/Redis — this project's
# ingestion DAG is two lightweight HTTP-fetch tasks every few minutes,
# nowhere near what would justify a distributed executor. Single-machine
# LocalExecutor is the right-sized choice and easy to defend in an
# interview as "I picked this because the workload didn't need more."
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    NTA_API_KEY: ${NTA_API_KEY}
    GTFS_RAW_DATA_DIR: /opt/airflow/data/raw
    GTFS_STATIC_DATA_DIR: /opt/airflow/data/static
    AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS: ""
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs/scheduler /opt/airflow/logs/dag_processor_manager
        chown -R 50000:0 /opt/airflow/logs
        chmod -R 775 /opt/airflow/logs
        su -s /bin/bash airflow -c "airflow db migrate"
        su -s /bin/bash airflow -c "airflow users create \
          --username admin --password admin \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
