services:
  - type: web
    name: dublin-transit-api
    runtime: node
    plan: free
    rootDir: webapp/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NTA_API_KEY
        sync: false # set manually in the Render dashboard — never committed
      - key: LIVE_FEED_CACHE_MS
        value: "30000"

  - type: web
    name: dublin-transit-client
    runtime: static
    rootDir: webapp/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # set manually once the API service's URL is known, e.g. https://dublin-transit-api.onrender.com
